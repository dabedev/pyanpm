name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.0
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $tag = "${{ github.ref_name }}"
          } else {
            $tag = "${{ inputs.tag }}".Trim()
          }

          if (-not $tag) {
            throw "A release tag is required."
          }

          if (-not $tag.StartsWith("v")) {
            throw "Release tag must start with 'v'."
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Validate release versions
        id: release_version
        shell: pwsh
        run: |
          $cargoToml = Get-Content -Path "Cargo.toml" -Raw
          $cargoMatch = [regex]::Match($cargoToml, '(?ms)^\[workspace\.package\].*?^version\s*=\s*"([^"]+)"')

          if (-not $cargoMatch.Success) {
            throw "Could not find workspace.package version in Cargo.toml."
          }

          $cargoVersion = $cargoMatch.Groups[1].Value
          $tauriConfig = Get-Content -Path "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $tauriVersion = [string]$tauriConfig.version
          $expectedTag = "v$cargoVersion"
          $actualTag = "${{ steps.release_tag.outputs.tag }}"

          if ($actualTag -ne $expectedTag) {
            throw "Release tag '$actualTag' does not match Cargo workspace version '$cargoVersion'. Expected tag: '$expectedTag'."
          }

          if ($tauriVersion -ne $cargoVersion) {
            throw "Tauri version '$tauriVersion' does not match Cargo workspace version '$cargoVersion'."
          }

          "version=$cargoVersion" >> $env:GITHUB_OUTPUT

      - name: Install desktop dependencies
        run: pnpm install --frozen-lockfile

      - name: Test core
        run: cargo test -p pyanpm-core

      - name: Check workspace
        run: cargo check --workspace

      - name: Check desktop
        run: pnpm run check

      - name: Test desktop
        run: pnpm run test

      - name: Build CLI release
        run: cargo build --release -p pyanpm-cli

      - name: Build Companion release
        run: pnpm run build:companion

      - name: Package release artifacts
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File ./scripts/release/Create-Release-Artifacts.ps1 -CommitSha "${{ github.sha }}"

      - name: Generate release notes
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File ./scripts/release/New-Release-Notes.ps1 `
            -Version "${{ steps.release_version.outputs.version }}" `
            -Tag "${{ steps.release_tag.outputs.tag }}" `
            -CommitSha "${{ github.sha }}" `
            -OutputPath (Join-Path $env:RUNNER_TEMP "RELEASE_NOTES.md")

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pyanpm-windows-release-artifacts
          path: |
            .dist/releases/pyanpm-cli-windows-x64-v${{ steps.release_version.outputs.version }}.zip
            .dist/releases/pyanpm-companion-windows-x64-v${{ steps.release_version.outputs.version }}-setup.exe
            .dist/releases/pyanpm-bundled-windows-x64-v${{ steps.release_version.outputs.version }}.zip
            .dist/releases/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: v${{ steps.release_version.outputs.version }}
          body_path: ${{ runner.temp }}/RELEASE_NOTES.md
          files: |
            .dist/releases/pyanpm-cli-windows-x64-v${{ steps.release_version.outputs.version }}.zip
            .dist/releases/pyanpm-companion-windows-x64-v${{ steps.release_version.outputs.version }}-setup.exe
            .dist/releases/pyanpm-bundled-windows-x64-v${{ steps.release_version.outputs.version }}.zip
            .dist/releases/SHA256SUMS.txt
